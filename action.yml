name: 'Kiro CLI Review Action'
description: 'Automated PR code review using kiro-cli with ACP integration'
branding:
  icon: 'eye'
  color: 'blue'

inputs:
  kiro_api_key:
    description: 'Kiro CLI API key'
    required: true
  github_token:
    description: 'GitHub token for MCP Server and PR comments'
    required: false
  agent:
    description: 'Custom agent name (defaults to bundled code-reviewer)'
    required: false
  prompt:
    description: 'Direct prompt to execute. When provided, runs in prompt mode without requiring a PR context.'
    required: false
  max_diff_size:
    description: 'Maximum diff size in characters'
    default: '10000'
  debug:
    description: 'Show full ACP JSON-RPC messages in logs. WARNING: may include tool execution results containing sensitive data. Only enable for debugging in non-sensitive environments.'
    default: 'false'
  github_mcp_version:
    description: 'github-mcp-server version to install'
    default: '0.32.0'

outputs:
  review_result:
    description: 'Review summary (pass/fail/skip)'
  exit_code:
    description: 'kiro-cli exit code (0=success, 1=failure)'

runs:
  using: 'node24'
  main: 'dist/main/index.cjs'
  post: 'dist/post/index.cjs'
