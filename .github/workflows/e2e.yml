name: E2E Test

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    name: E2E Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Test Action
        id: test
        uses: ./
        with:
          kiro_api_key: ${{ secrets.KIRO_API_KEY }}
        continue-on-error: true

      - name: Verify outputs
        run: |
          RESULT="${{ steps.test.outputs.review_result }}"
          EXIT_CODE="${{ steps.test.outputs.exit_code }}"

          echo "review_result: $RESULT"
          echo "exit_code: $EXIT_CODE"

          if [ -z "$RESULT" ]; then
            echo "❌ No review_result output"
            exit 1
          fi

          echo "✅ Action produced outputs"
