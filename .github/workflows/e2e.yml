name: E2E Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install kiro-cli
        run: |
          curl -fsSL https://cli.kiro.dev/install | bash -s -- --force
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify kiro-cli
        run: kiro-cli --version

      - name: Install github-mcp-server
        run: |
          curl -L "https://github.com/github/github-mcp-server/releases/download/v0.32.0/github-mcp-server_Linux_x86_64.tar.gz" | tar xz
          chmod +x github-mcp-server
          ./github-mcp-server --help || true

      - name: Test ACP connection
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' | timeout 30 kiro-cli acp || EXIT_CODE=$?
          if [ "${EXIT_CODE:-0}" -le 1 ]; then
            echo "✅ ACP process started and responded"
          else
            echo "❌ ACP process failed with code $EXIT_CODE"
            exit 1
          fi
