name: E2E Test

on:
  workflow_dispatch:
    inputs:
      test_prompt:
        description: 'Test prompt for kiro-cli'
        required: false
        default: 'List the files in the current directory starting with "package"'

permissions:
  contents: read

jobs:
  test-prompt-mode:
    name: Test Prompt Mode
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Test with prompt
        id: test
        uses: ./
        with:
          kiro_api_key: ${{ secrets.KIRO_API_KEY }}
          github_token: ${{ github.token }}
          prompt: ${{ inputs.test_prompt }}
          debug: 'true'

      - name: Verify outputs
        run: |
          RESULT="${{ steps.test.outputs.review_result }}"
          EXIT_CODE="${{ steps.test.outputs.exit_code }}"

          echo "review_result: $RESULT"
          echo "exit_code: $EXIT_CODE"

          if [ "$RESULT" = "pass" ]; then
            echo "✅ Action completed successfully"
          elif [ "$RESULT" = "fail" ]; then
            echo "❌ Action failed"
            exit 1
          else
            echo "❌ Unexpected result: $RESULT"
            exit 1
          fi
